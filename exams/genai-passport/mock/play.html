<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>生成AIパスポート 模擬試験 — AI Master</title>
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/images/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/assets/images/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1A5CDB">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/main.css">
  <link rel="stylesheet" href="../../../assets/css/hub.css">
  <link rel="stylesheet" href="../../../assets/css/seo.css">
  <link rel="stylesheet" href="../../../assets/css/exam-player.css">
</head>
<body class="page-body">

<nav class="site-nav">
  <a href="../../../index.html" class="logo">AI<em>マスター</em></a>
  <ul class="nav-links">
    <li><a href="../../index.html" class="active">試験対策</a></li>
    <li><a href="../../../glossary/">用語辞典</a></li>
    <li><a href="../../../tools/">AIツール</a></li>
    <li><a href="../../../career/">キャリア</a></li>
  </ul>
</nav>

<main class="page-wrap page-wrap--article page-wrap--quiz">
  <nav class="breadcrumb" aria-label="パンくずリスト">
    <ol>
      <li><a href="../../../index.html">ホーム</a></li>
      <li><a href="../../index.html">試験対策</a></li>
      <li><a href="../index.html">生成AIパスポート</a></li>
      <li><a href="index.html">模擬試験</a></li>
      <li aria-current="page">受験</li>
    </ol>
  </nav>

  <header class="hub-header">
    <h1 id="mock-title">生成AIパスポート 模擬試験</h1>
    <p class="hub-intro">制限時間内にすべての問題に回答してください。解答後に解説を確認できます。</p>
  </header>

  <div id="exam-player" class="quiz">
    <div class="quiz-bar" hidden>
      <div class="quiz-progress"></div>
      <div class="quiz-timer" hidden></div>
    </div>

    <div class="quiz-stage" hidden>
      <article class="quiz-question-card">
        <div class="quiz-question-card__head">
          <p class="quiz-meta"></p>
          <button type="button" class="quiz-bookmark" aria-pressed="false">
            <svg class="quiz-bookmark__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M4 2.5h8v11l-4-3-4 3v-11z" stroke-linejoin="round"/></svg>
            ブックマーク
          </button>
        </div>
        <p class="quiz-prompt"></p>
      </article>

      <p class="quiz-hint quiz-hint--tf" hidden></p>
      <p class="quiz-hint quiz-hint--choice" hidden></p>

      <div class="quiz-choices"></div>

      <div class="quiz-feedback" hidden>
        <p class="quiz-feedback__verdict"></p>
        <p class="quiz-feedback__body"></p>
      </div>
      <div class="quiz-actions" hidden>
        <p class="quiz-hint quiz-hint--next">キーボード <kbd>Enter</kbd> で次へ</p>
        <button type="button" class="quiz-btn quiz-btn--primary quiz-next">次の問題</button>
      </div>
    </div>

    <div class="quiz-complete quiz-panel" hidden>
      <h2>完了</h2>
      <p class="quiz-complete__score"></p>
      <div class="quiz-panel__actions">
        <button type="button" class="quiz-btn quiz-complete__retry">最初からやり直す</button>
        <button type="button" class="quiz-btn quiz-btn--primary quiz-complete__back">模擬試験一覧へ</button>
      </div>
    </div>
  </div>
</main>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const examId = params.get("exam") || "mock_01";
  const root = document.getElementById("exam-player");
  root.dataset.config = JSON.stringify({
    mode: "choice",
    dataUrl: "../../../assets/data/genai-passport/mock.json",
    examId: examId,
    storagePrefix: "genai-passport",
    storageKey: "mock",
    timeLimitMinutes: 60,
    backUrl: "index.html",
  });

  fetch("../../../assets/data/genai-passport/mock.json")
    .then((r) => r.json())
    .then((data) => {
      const exam = data.exams?.[examId];
      if (exam) {
        document.getElementById("mock-title").textContent = "生成AIパスポート " + exam.title;
        document.title = "生成AIパスポート " + exam.title + " — AI Master";
      }
    })
    .catch(() => {});
})();
</script>
<script src="../../../assets/js/exam-flags.js"></script>
<script src="../../../assets/js/exam-player.js"></script>
</body>
</html>
