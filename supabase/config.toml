# Supabase CLI 用（Edge Functions デプロイ）
# https://supabase.com/docs/guides/cli/config

project_id = "ai-master"

[api]
enabled = true

[db]
major_version = 15

# ブラウザから sb_publishable_ キーで呼ぶため JWT 検証をオフ
[functions.create-mock-checkout]
verify_jwt = false

[functions.fulfill-mock-session]
verify_jwt = false

[functions.verify-mock-access]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false
